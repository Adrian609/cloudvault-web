name: SonarQube

on:
  push:
    branches:
      - main
      - master
      - dev
      - dev-adrian
  pull_request:
    branches:
      - main
      - master
      - dev
      - dev-adrian
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarqube-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate coverage and test reports
        run: python -m pytest --cov=. --cov-report=xml --junitxml=test-results.xml

      - name: Generate Bandit JSON report
        run: bandit -r . -x tests,.venv,venv,__pycache__,.git -f json -o bandit-report.json --exit-zero

      - name: Verify Bandit JSON report
        run: |
          ls -lah bandit-report.json
          python -m json.tool bandit-report.json > /dev/null

      - name: Upload SonarQube Bandit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sonarqube-bandit-report
          path: bandit-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Write SonarQube Bandit import summary
        run: |
          {
            echo "## SonarQube Bandit Import"
            echo ""
            echo "- Bandit report generated: yes"
            echo "- Bandit report path: \`bandit-report.json\`"
            echo "- Sonar imports Bandit via: \`sonar.python.bandit.reportPaths=bandit-report.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
