{% extends "base.html" %}

{% block content %}
<h2>My Files</h2>

{% if files %}
<table border="1" cellpadding="5">
    <tr>
        <th>ID</th>
        <th>File Name</th>
        <th>Encrypted</th>
        <th>Uploaded At</th>
    </tr>

    {% for file in files %}
    <tr>
        <td>{{ file.id }}</td>
        <td>{{ file.filename }}</td>
        <td>{{ file.encrypted }}</td>
        <td>{{ file.upload_time }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No files uploaded yet.</p>
{% endif %}
{% endblock %}
